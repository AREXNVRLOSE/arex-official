<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREX PRO | Cloud Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --whatsapp: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Sidebar Fix */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background: #0f172a; z-index: 1000; transition: 0.4s; padding: 30px 20px; border-right: 1px solid var(--border); }
        .sidebar.active { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        
        .sidebar h2 { font-weight: 800; margin-bottom: 30px; color: var(--primary); }
        .menu-item { padding: 14px 18px; display: block; color: #94a3b8; text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; font-weight: 600; }
        .menu-item:hover, .menu-item.active { background: var(--primary); color: white; }

        /* Header */
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .menu-toggle { font-size: 24px; cursor: pointer; color: var(--primary); }

        /* Main Content */
        .container { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 2rem; font-weight: 800; margin-bottom: 30px; text-align: center; }

        /* Plans Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 35px; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .price { font-size: 3.5rem; font-weight: 800; margin: 20px 0; }
        .features { list-style: none; margin-bottom: 25px; }
        .features li { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-size: 0.9rem; }

        /* Payment UI */
        .payment-box { background: #1e293b; border-radius: 20px; padding: 25px; text-align: center; border: 2px solid var(--primary); }
        .qr-img { width: 180px; background: white; padding: 10px; border-radius: 15px; margin: 15px 0; }
        .upi-id { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; font-weight: 700; margin-bottom: 20px; border: 1px dashed var(--primary); }

        /* Buttons */
        .btn { display: block; width: 100%; padding: 16px; border-radius: 14px; font-weight: 700; text-decoration: none; text-align: center; transition: 0.3s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-wa { background: var(--whatsapp); color: white; margin-top: 15px; }

        .float-wa { position: fixed; bottom: 30px; right: 30px; background: var(--whatsapp); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 100; color: white; text-decoration: none; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2>AREX PRO</h2>
        <a href="#" class="menu-item active" onclick="toggleMenu()">🏠 Dashboard</a>
        <a href="#plans" class="menu-item" onclick="toggleMenu()">💎 Premium Plans</a>
        <a href="#payment" class="menu-item" onclick="toggleMenu()">💳 Payment Option</a>
        <a href="https://wa.me/91XXXXXXXXXX" class="menu-item" style="color:var(--whatsapp)">💬 WhatsApp Help</a>
        <a href="https://t.me/AREXNVRLOSE" class="menu-item">📢 Telegram</a>
    </div>
    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

    <header>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <div style="font-weight: 800; font-size: 1.4rem;">AREX HOST</div>
        <div style="width: 24px;"></div>
    </header>

    <div class="container">
        <h1 class="section-title" id="plans">Our Premium Plans</h1>
        <div class="grid">
            <div class="card">
                <div style="position:absolute; top:15px; right:15px; background:var(--primary); font-size:10px; padding:3px 10px; border-radius:10px;">POPULAR</div>
                <h3>Mega Saver</h3>
                <div class="price">₹31<span>/mo</span></div>
                <ul class="features">
                    <li><span>NVMe Storage</span><b>10 GB</b></li>
                    <li><span>RAM</span><b>2 GB</b></li>
                    <li><span>CPU</span><b>1 vCPU</b></li>
                    <li><span>SSL</span><b>Free</b></li>
                </ul>
                <a href="#payment" class="btn btn-blue">Buy Now</a>
            </div>
        </div>

        <h1 class="section-title" id="payment">Payment Options</h1>
        <div class="grid">
            <div class="payment-box">
                <p>Scan to pay ₹31</p>
                <img src="1000003225.jpg" class="qr-img" alt="QR Code">
                <div class="upi-id">UPI: Abhimassey@fam</div>
                <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I paid ₹31 for Mega Saver. Here is the screenshot." class="btn btn-wa">Send Payment Proof</a>
            </div>
        </div>
    </div>

    <a href="https://wa.me/91XXXXXXXXXX" class="float-wa">💬</a>

    <script>
        function toggleMenu() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('active');
            ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
        }
    </script>
</body>
</html>
