<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="HsYnoFWLu8CwqFze48EK2fjGONopioQx73js35MjOEY" />

    <title>AREX HOSTING</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #020617;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #06b6d4;
            letter-spacing: 1px;
        }

        /* LOGIN BUTTON */
        .login-btn {
            background: #06b6d4;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #fff;
            transform: scale(1.05);
        }

        /* MAIN CONTENT */
        .content {
            padding: 50px 40px;
            text-align: center;
        }

        .content h1 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .content p {
            color: #94a3b8;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">AREX HOSTING</div>
        <button class="login-btn" onclick="arexGoogleLogin()">Login with Google</button>
    </div>

    <div class="content">
        <h1>Welcome to the Future of Hosting</h1>
        <p id="user-status">Please click the button above to login securely via Firebase.</p>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        // Aapki exact Firebase Keys
        const firebaseConfig = {
            apiKey: "AIzaSyD_lt41h8yEvPsEwsJlYSBK8RL5aDvnd3Q",
            authDomain: "arex-hosting.firebaseapp.com",
            projectId: "arex-hosting",
            storageBucket: "arex-hosting.firebasestorage.app",
            messagingSenderId: "1035658227174",
            appId: "1:1035658227174:web:67ef3effc74ab01d15fa27",
            measurementId: "G-2ZFV6GGBWL"
        };

        // Firebase Initialize
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 1. LOGIN BUTTON DABAANE PAR KYA HOGA (Mobile ke liye Redirect)
        function arexGoogleLogin() {
            document.getElementById('user-status').innerText = "Loading Google Login...";
            auth.signInWithRedirect(provider);
        }

        // 2. PAGE WAPAS AANE PAR CHECK KAREGA KI LOGIN HUA YA NAHI
        auth.getRedirectResult().then((result) => {
            if (result && result.user) {
                const user = result.user;
                // Update Text on Website
                document.getElementById('user-status').innerText = "Logged in successfully as: " + user.email;
                document.getElementById('user-status').style.color = "#4ade80"; // Green color
                alert("✅ Welcome, " + user.displayName + "!");
            }
        }).catch((error) => {
            console.error("Login Error:", error);
            document.getElementById('user-status').innerText = "❌ Login Failed: " + error.message;
            document.getElementById('user-status').style.color = "#ef4444"; // Red color
        });

        // 3. AGAR PEHLE SE LOGIN HAI TOH AUTOMATIC DIKHAYEGA
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('user-status').innerText = "Logged in successfully as: " + user.email;
                document.getElementById('user-status').style.color = "#4ade80";
            }
        });
    </script>
    

        
</body>
</html>
