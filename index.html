<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="HsYnoFWLu8CwqFze48EK2fjGONopioQx73js35MjOEY" />

<title>AREX HOSTING | Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --bg: #020617;
    --glass: rgba(255,255,255,0.05);
    --accent: #06b6d4;
    --accent2: #3b82f6;
    --text: #f1f5f9;
    --dim: #94a3b8;
}

* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: var(--text);
}

/* Sidebar */
.sidebar {
    position: fixed;
    width: 250px;
    height: 100vh;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 25px;
}

.logo-area {
    text-align:center;
    margin-bottom:40px;
}

.logo-area img {
    width:100px;
    border-radius:50%;
    box-shadow:0 0 25px rgba(6,182,212,0.4);
}

.brand {
    margin-top:10px;
    font-weight:700;
    color:var(--accent);
}

/* Nav */
.nav a {
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    color:var(--dim);
    text-decoration:none;
    transition:0.3s;
}

.nav a:hover, .nav a.active {
    background: linear-gradient(90deg, rgba(6,182,212,0.2), transparent);
    color:var(--accent);
    transform:translateX(5px);
}

/* Main */
.main {
    margin-left:250px;
    padding:25px;
}

/* Topbar */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.profile {
    display:flex;
    align-items:center;
    gap:10px;
}

.profile img {
    width:40px;
    border-radius:50%;
}

/* Cards */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card {
    background: var(--glass);
    padding:20px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.05);
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.card::before {
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(6,182,212,0.2), transparent);
    top:-100%;
    transition:0.5s;
}

.card:hover::before {
    top:100%;
}

.card:hover {
    transform:translateY(-6px) scale(1.02);
    border-color: var(--accent);
}

.card h3 {
    color:var(--dim);
    font-size:14px;
}

.card h2 {
    margin-top:10px;
    font-size:28px;
}

/* Button */
.btn {
    margin-top:15px;
    background: linear-gradient(45deg, var(--accent), var(--accent2));
    padding:10px 15px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.05);
}

/* Pages */
.page { display:none; }
.page.active { display:block; }

@media(max-width:768px){
    .sidebar{width:80px;}
    .main{margin-left:80px;}
    .nav span{display:none;}
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo-area">
        <img src="https://i.ibb.co/Lzt9YV3/IMG-20260502-072355-683.webp">
        <div class="brand">AREX</div>
    </div>

    <div class="nav">
        <a class="nav-item active" onclick="showPage(event,'dashboard')"><i class="fa fa-chart-line"></i> <span>Dashboard</span></a>
        <a class="nav-item" onclick="showPage(event,'services')"><i class="fa fa-server"></i> <span>Services</span></a>
        <a class="nav-item" onclick="showPage(event,'billing')"><i class="fa fa-credit-card"></i> <span>Billing</span></a>
        <a class="nav-item" onclick="showPage(event,'support')"><i class="fa fa-headset"></i> <span>Support</span></a>
    </div>
</div>

<!-- Main -->
<div class="main">

<div class="topbar">
    <h2>Dashboard</h2>
    <div class="profile">
        <img src="https://i.ibb.co/Lzt9YV3/IMG-20260502-072355-683.webp">
        <span>Aryan</span>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="page active">
    <div class="grid">

        <div class="card">
            <h3>Active Services</h3>
            <h2>03</h2>
        </div>

        <div class="card">
            <h3>Server Status</h3>
            <h2 style="color:lightgreen;">ONLINE</h2>
            <button class="btn" onclick="alert('Server Restarted')">Restart</button>
        </div>

        <div class="card">
            <h3>Total Earnings</h3>
            <h2>₹0</h2>
        </div>

    </div>
</div>

<!-- Services -->
<div id="services" class="page">
    <div class="card">
        <h3>Web Hosting</h3>
        <button class="btn">Manage</button>
    </div>
</div>

<!-- Billing -->
<div id="billing" class="page">
    <div class="card">
        <h3>Balance</h3>
        <h2>₹0.00</h2>
        <button class="btn">Add Funds</button>
    </div>
</div>

<!-- Support -->
<div id="support" class="page">
    <div class="card">
        <h3>Create Ticket</h3>
        <button class="btn">Open</button>
    </div>
</div>

</div>

<script>
function showPage(e,id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    e.currentTarget.classList.add('active');
}
</script>

</body>
    </html>
