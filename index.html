<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="HsYnoFWLu8CwqFze48EK2fjGONopioQx73js35MjOEY" />
    
    <title>AREX HOSTING | Pro Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-dark: #020617;
            --sidebar-bg: rgba(15, 23, 42, 0.8);
            --accent: #06b6d4;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* Glassmorphism Sidebar */
        .sidebar {
            position: fixed; left: 0; top: 0; height: 100vh; width: 260px;
            background: var(--sidebar-bg); backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 30px 20px;
            z-index: 1000;
        }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area img { width: 120px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
        .brand-name { font-family: 'Urbanist', sans-serif; font-size: 22px; font-weight: 700; margin-top: 15px; letter-spacing: 2px; color: var(--accent); }

        .nav-menu { list-style: none; }
        .nav-item { 
            padding: 12px 15px; margin-bottom: 8px; border-radius: 10px;
            display: flex; align-items: center; gap: 15px; color: var(--text-dim);
            text-decoration: none; transition: 0.3s; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background: rgba(6, 182, 212, 0.1); color: var(--accent); }

        /* Main Content */
        .main-content { margin-left: 260px; padding: 40px; }
        .welcome-text h1 { font-family: 'Urbanist', sans-serif; font-size: 32px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { 
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px; border-radius: 16px; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        @media (max-width: 768px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .brand-name, .nav-item span { display: none; }
            .main-content { margin-left: 80px; padding: 20px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <img src="https://i.ibb.co/Lzt9YV3/IMG-20260502-072355-683.webp" alt="AREX Logo">
            <div class="brand-name">AREX PRO</div>
        </div>
        <ul class="nav-menu">
            <a href="#" class="nav-item active"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-server"></i> <span>My Services</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-credit-card"></i> <span>Billing</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-headset"></i> <span>Support</span></a>
        </ul>
    </nav>

    <div class="main-content">
        <header>
            <div class="welcome-text">
                <h1>Welcome, <span>Aryan</span></h1>
                <p style="color: var(--text-dim);">Arex Hosting Control Panel | Never Lose, Always Lead</p>
            </div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <h3 style="color: var(--text-dim); font-size: 14px;">ACTIVE SERVICES</h3>
                <div style="font-size: 28px; font-weight: 700; margin-top: 10px;">03</div>
            </div>
            <div class="card">
                <h3 style="color: var(--text-dim); font-size: 14px;">TERMUX STATUS</h3>
                <div style="font-size: 16px; font-weight: 600; color: var(--accent); margin-top: 10px;">Running on Port 8080</div>
            </div>
        </div>
    </div>

</body>
</html>
