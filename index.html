<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="HsYnoFWLu8CwqFze48EK2fjGONopioQx73js35MjOEY" />
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Page UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 30px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: white; border: 1px solid #e2e8f0; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 500; color: #475569; }
        .tab-btn.active { background: #f97316; color: white; border-color: #f97316; }

        .page { display: none; max-width: 500px; width: 100%; background: white; border-radius: 20px; border: 1px solid #e2e8f0; padding: 40px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .page.active { display: block; }

        h3 { color: #0f172a; margin-bottom: 8px; }
        p { color: #475569; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

        .btn { background: #f97316; color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(249,115,22,0.2); transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: #ea6a0c; transform: translateY(-2px); }

        .btn-outline { background: transparent; color: #f97316; border: 1px solid #f97316; box-shadow: none; }
        .btn-outline:hover { background: #f97316; color: white; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchPage('page1')">Home</button>
        <button class="tab-btn" onclick="switchPage('page2')">Pricing</button>
        <button class="tab-btn" onclick="switchPage('page3')">Billing</button>
        <button class="tab-btn" onclick="switchPage('page4')">Support</button>
    </div>

    <!-- PAGE 1 -->
    <div id="page1" class="page active">
        <h3>🏠 Welcome to Arex Pro</h3>
        <p>Your all-in-one hosting dashboard.</p>
        <button class="btn"><i class="fas fa-rocket"></i> Launch Dashboard</button>
    </div>

    <!-- PAGE 2 -->
    <div id="page2" class="page">
        <h3>💰 Choose Your Plan</h3>
        <p>Start with our most popular hosting plan.</p>
        <button class="btn"><i class="fas fa-crown"></i> Select Plan</button>
    </div>

    <!-- PAGE 3 -->
    <div id="page3" class="page">
        <h3>📄 Your Invoices</h3>
        <p>View and pay your outstanding bills instantly.</p>
        <button class="btn"><i class="fas fa-file-invoice"></i> View Invoices</button>
    </div>

    <!-- PAGE 4 -->
    <div id="page4" class="page">
        <h3>💬 Need Help?</h3>
        <p>Reach out to our support team anytime.</p>
        <button class="btn btn-outline"><i class="fab fa-telegram"></i> Contact Telegram</button>
        <button class="btn" style="margin-left: 10px;"><i class="fas fa-envelope"></i> Email Support</button>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>

</body>
</html>
