<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE VERIFY -->
<meta name="google-site-verification" content="HsYnoFWLu8CwqFze48EK2fjGONopioQx73js35MjOEY" />

<title>AREX PRO | Next-Gen Hosting</title>

<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* SAME YOUR STYLE (UNCHANGED) */
:root {
--bg:#020617;
--glass:rgba(255,255,255,0.03);
--accent:#06b6d4;
--text:#f1f5f9;
--dim:#94a3b8;
--card-border:rgba(255,255,255,0.08);
}

body{background:radial-gradient(circle at 50% -20%,#1e293b,var(--bg));color:var(--text);}

.sidebar{position:fixed;width:260px;height:100vh;background:rgba(2,6,23,0.8);padding:30px 20px}
.nav-item{display:flex;padding:14px;cursor:pointer;color:var(--dim)}
.nav-item.active{color:var(--accent)}

.main{margin-left:260px;padding:40px}
.page-content{display:none}
.page-content.active{display:block}

.btn-pro{margin-top:20px;padding:12px;background:var(--accent);border:none;border-radius:10px;cursor:pointer}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>AREX PRO</h2>

<div class="nav-item active" onclick="navigate(event,'dashboard')">Dashboard</div>
<div class="nav-item" onclick="navigate(event,'services')">Services</div>
<div class="nav-item" onclick="navigate(event,'billing')">Billing</div>
<div class="nav-item" onclick="navigate(event,'support')">Support</div>
<div class="nav-item" onclick="navigate(event,'admin')">Admin</div>

</div>

<!-- MAIN -->
<div class="main">

<h2 id="page-title">Dashboard</h2>

<!-- DASHBOARD -->
<div id="dashboard" class="page-content active">
<h3>System Running</h3>
<button class="btn-pro" onclick="alert('Server OK')">Check</button>
</div>

<!-- SERVICES -->
<div id="services" class="page-content">
<h3>Hosting Plans</h3>
<button class="btn-pro" onclick="startPayment()">Buy Hosting ₹500</button>
</div>

<!-- BILLING -->
<div id="billing" class="page-content">
<h3>Payments</h3>
<button class="btn-pro" onclick="startPayment()">Add Funds</button>
</div>

<!-- SUPPORT -->
<div id="support" class="page-content">
<h3>Support</h3>
<textarea placeholder="Write issue"></textarea>
<button class="btn-pro">Submit</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="page-content">

<h3>Admin Panel</h3>

<input id="planName" placeholder="Plan Name"><br><br>
<input id="planPrice" placeholder="Price"><br><br>
<button class="btn-pro" onclick="addPlan()">Add Plan</button>

<h4>Plans</h4>
<div id="planList"></div>

<h4>Users</h4>
<button onclick="loadUsers()">Load Users</button>
<div id="userList"></div>

</div>

</div>

<!-- SCRIPTS -->

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

// 🔥 NAVIGATION
function navigate(e,id){
document.querySelectorAll('.page-content').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
e.currentTarget.classList.add('active');

document.getElementById('page-title').innerText=id;
}

// 🔥 FIREBASE CONFIG (REPLACE)
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// 🔥 PAYMENT
async function startPayment(){
try{
let res=await fetch("http://localhost:8000/create-order");
let data=await res.json();

var rzp=new Razorpay({
key:"YOUR_RAZORPAY_KEY",
amount:data.amount,
currency:"INR",
order_id:data.id,
handler:function(){alert("Payment Success")}
});
rzp.open();

}catch{
alert("Backend not connected");
}
}

// 🔥 ADMIN
function addPlan(){
db.collection("plans").add({
name:planName.value,
price:planPrice.value
}).then(()=>alert("Plan Added"));
}

function loadUsers(){
userList.innerHTML="";
db.collection("users").get().then(snap=>{
snap.forEach(doc=>{
userList.innerHTML+=`<p>${doc.data().email}</p>`;
});
});
}

</script>

</body>
</html>
