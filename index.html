<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="HsYnoFWLu8CwqFze48EK2fjGONopioQx73js35MjOEY" />

<title>AREX HOSTING</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: #020617;
    border-bottom: 1px solid #1e293b;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #06b6d4;
}

/* LOGIN BUTTON */
.login-btn {
    background: #06b6d4;
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
}

/* CONTENT */
.content {
    padding: 50px;
    text-align: center;
}

/* DASHBOARD */
#dashboard {
    display: none;
    text-align: center;
    padding: 50px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">AREX HOSTING</div>
    <button class="login-btn" onclick="arexGoogleLogin()">Login with Google</button>
</div>

<!-- LOGIN PAGE -->
<div class="content" id="loginPage">
    <h1>Welcome to AREX Hosting</h1>
    <p id="user-status">Click login to continue</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <h2>🚀 AREX DASHBOARD</h2>
    <p>You are logged in successfully</p>

    <button onclick="logout()" style="padding:10px 20px;background:red;color:white;border:none;border-radius:6px;">
        Logout
    </button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyD_lt41h8yEvPsEwsJlYSBK8RL5aDvnd3Q",
    authDomain: "arex-hosting.firebaseapp.com",
    projectId: "arex-hosting",
    storageBucket: "arex-hosting.firebasestorage.app",
    messagingSenderId: "1035658227174",
    appId: "1:1035658227174:web:67ef3effc74ab01d15fa27"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

function arexGoogleLogin() {
    document.getElementById('user-status').innerText = "Opening login...";
    
    auth.signInWithPopup(provider)
    .then((result) => {
        document.getElementById('user-status').innerText = "Welcome " + result.user.displayName;
    })
    .catch((error) => {
        document.getElementById('user-status').innerText = error.message;
    });
}

function logout() {
    auth.signOut();
}

auth.onAuthStateChanged((user) => {
    if (user) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    } else {
        document.getElementById("loginPage").style.display = "block";
        document.getElementById("dashboard").style.display = "none";
    }
});
</script>

</body>
        </html>
