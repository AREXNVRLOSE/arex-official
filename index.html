<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREX | Premium Hosting</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
            --secondary: #111111;
            --text-dim: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Ambient Glow Background */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .main-card {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 40px 20px;
        }

        .logo-box {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 20px;
            font-weight: 300;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 15px;
        }

        p {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 18px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .btn-black {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-black:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid #333;
        }

        .btn-outline:hover {
            border-color: var(--accent);
            background: rgba(255,255,255,0.03);
        }

        .footer-tag {
            margin-top: 50px;
            font-size: 10px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-box">Official Portal</div>
        <h1>AREX.<br>HOSTING</h1>
        <p>Aesthetic cloud infrastructure & automation solutions for the next generation.</p>

        <div class="actions">
            <a href="https://t.me/AREXNVRLOSE" class="btn btn-black">Get Started Now</a>
            <a href="https://github.com/AREXNVRLOSE" class="btn btn-outline">Project Portfolio</a>
        </div>

        <div class="footer-tag">© 2026 AREX NVRLOSE</div>
    </div>

</body>
</html>
