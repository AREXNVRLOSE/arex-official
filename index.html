<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AREX HOISTING · Hosting Seller Dashboard</title>
  <!-- Google Fonts Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      /* NEXT LEVEL BACKGROUND: Multi-layered gradient with cosmic depth */
      background: #0a1120;
      background-image: 
        /* Soft radial glows for atmosphere */
        radial-gradient(ellipse at 10% 10%, rgba(44, 95, 138, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(182, 139, 92, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 30%, rgba(100, 150, 200, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 80%, rgba(44, 95, 138, 0.2) 0%, transparent 50%),
        /* Linear gradients for base depth */
        linear-gradient(135deg, #0d1b2a 0%, #0a1628 25%, #0c1f35 50%, #091525 75%, #0b1a2e 100%),
        /* Animated gradient overlay */
        linear-gradient(45deg, rgba(44, 95, 138, 0.05) 0%, transparent 50%, rgba(182, 139, 92, 0.05) 100%);
      background-attachment: fixed;
      display: flex;
      min-height: 100vh;
      color: #e2e8f0;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated floating particles effect */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(1px 1px at 10% 20%, rgba(255, 255, 255, 0.4), transparent),
        radial-gradient(1px 1px at 20% 60%, rgba(255, 255, 255, 0.3), transparent),
        radial-gradient(2px 2px at 30% 10%, rgba(44, 95, 138, 0.5), transparent),
        radial-gradient(1px 1px at 40% 80%, rgba(255, 255, 255, 0.4), transparent),
        radial-gradient(2px 2px at 50% 40%, rgba(182, 139, 92, 0.4), transparent),
        radial-gradient(1px 1px at 60% 15%, rgba(255, 255, 255, 0.3), transparent),
        radial-gradient(2px 2px at 70% 70%, rgba(44, 95, 138, 0.5), transparent),
        radial-gradient(1px 1px at 80% 30%, rgba(255, 255, 255, 0.4), transparent),
        radial-gradient(2px 2px at 90% 55%, rgba(182, 139, 92, 0.4), transparent),
        radial-gradient(1px 1px at 15% 90%, rgba(255, 255, 255, 0.3), transparent),
        radial-gradient(2px 2px at 75% 45%, rgba(44, 95, 138, 0.35), transparent),
        radial-gradient(1px 1px at 45% 25%, rgba(255, 255, 255, 0.3), transparent);
      background-size: 200% 200%;
      animation: particleFloat 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes particleFloat {
      0%, 100% { background-position: 0% 0%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
    }

    /* Subtle grid overlay */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== SIDEBAR – premium glassmorphism ===== */
    .sidebar {
      width: 280px;
      background: rgba(12, 20, 35, 0.75);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      padding: 24px 14px 20px;
      box-shadow: 20px 0 40px rgba(0, 0, 0, 0.6), inset -1px 0 0 rgba(255, 255, 255, 0.03);
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
      z-index: 20;
      transition: width 0.25s ease;
      overflow-y: auto;
    }

    .sidebar::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, 
        rgba(44, 95, 138, 0.08) 0%, 
        transparent 30%, 
        transparent 70%, 
        rgba(182, 139, 92, 0.05) 100%);
      pointer-events: none;
    }

    /* Brand area */
    .brand-area {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 8px 24px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      z-index: 1;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #2c5f8a 0%, #1a3f5c 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5e7d3;
      font-size: 20px;
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.6), 0 0 20px rgba(44, 95, 138, 0.3);
      border: 1px solid rgba(245, 231, 211, 0.2);
    }

    .brand-text h2 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0 0%, #f5e7d3 50%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.4px;
      line-height: 1.2;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .brand-text span {
      font-size: 11px;
      font-weight: 700;
      color: #b68b5c;
      letter-spacing: 0.8px;
      display: block;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Search */
    .search-box {
      margin: 0 4px 22px;
      position: relative;
      z-index: 1;
    }

    .search-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #5a7a9a;
      font-size: 14px;
      transition: color 0.2s;
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      font-size: 14px;
      font-weight: 500;
      color: #e2e8f0;
      outline: none;
      transition: all 0.3s;
    }

    .search-box input::placeholder {
      color: #5a6f85;
    }

    .search-box input:focus {
      border-color: #2c5f8a;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px rgba(44, 95, 138, 0.15), 0 0 20px rgba(44, 95, 138, 0.1);
    }

    .search-box input:focus + i,
    .search-box input:focus ~ i {
      color: #b68b5c;
    }

    .nav-menu {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: relative;
      z-index: 1;
    }

    /* Sidebar buttons – enhanced glass */
    .sidebar-btn {
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 14px;
      background: transparent;
      color: #8fa3b8;
      font-weight: 500;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .sidebar-btn::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      background: linear-gradient(180deg, #2c5f8a, #b68b5c);
      border-radius: 0 3px 3px 0;
      transition: height 0.3s ease;
    }

    .sidebar-btn i {
      width: 22px;
      font-size: 1.15rem;
      color: #5a7a9a;
      transition: all 0.2s;
    }

    .sidebar-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #d4e0f0;
      padding-left: 20px;
    }

    .sidebar-btn:hover::before {
      height: 60%;
    }

    .sidebar-btn:hover i {
      color: #b68b5c;
      transform: scale(1.1);
    }

    /* Active state – premium gradient */
    .sidebar-btn.active {
      background: linear-gradient(135deg, rgba(44, 95, 138, 0.3) 0%, rgba(26, 60, 90, 0.4) 100%);
      color: white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), 0 0 20px rgba(44, 95, 138, 0.15);
      font-weight: 600;
      border: 1px solid rgba(245, 231, 211, 0.15);
      padding-left: 20px;
    }

    .sidebar-btn.active::before {
      height: 70%;
      background: linear-gradient(180deg, #f5e7d3, #b68b5c);
    }

    .sidebar-btn.active i {
      color: #f5e7d3;
      filter: drop-shadow(0 0 8px rgba(245, 231, 211, 0.5));
    }

    .sidebar-bottom {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .logout-btn {
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 14px;
      background: transparent;
      color: #8fa3b8;
      font-weight: 500;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    .logout-btn i {
      width: 22px;
      font-size: 1.15rem;
      color: #5a7a9a;
      transition: 0.2s;
    }

    .logout-btn:hover {
      background: rgba(220, 80, 80, 0.15);
      color: #f4a2a2;
      box-shadow: 0 0 20px rgba(220, 80, 80, 0.1);
    }

    .logout-btn:hover i {
      color: #e57373;
      transform: scale(1.1);
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      margin-left: 280px;
      flex: 1;
      padding: 36px 40px;
      background: transparent;
      min-height: 100vh;
      transition: margin-left 0.25s ease;
      position: relative;
      z-index: 1;
    }

    .page {
      display: none;
      animation: fadeSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .page.active {
      display: block;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Stats cards – premium glass */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: rgba(15, 25, 42, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 22px;
      padding: 24px 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      gap: 18px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 80% 20%, rgba(44, 95, 138, 0.1), transparent 70%);
      pointer-events: none;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(44, 95, 138, 0.1);
    }

    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      position: relative;
      z-index: 1;
    }

    .stat-icon.blue { 
      background: linear-gradient(135deg, rgba(44, 95, 138, 0.3), rgba(30, 70, 110, 0.4)); 
      color: #7bb3d9; 
      box-shadow: 0 8px 20px rgba(44, 95, 138, 0.2);
      border: 1px solid rgba(44, 95, 138, 0.3);
    }
    .stat-icon.beige { 
      background: linear-gradient(135deg, rgba(182, 139, 92, 0.25), rgba(140, 100, 60, 0.35)); 
      color: #d4b68c; 
      box-shadow: 0 8px 20px rgba(182, 139, 92, 0.2);
      border: 1px solid rgba(182, 139, 92, 0.3);
    }
    .stat-icon.indigo { 
      background: linear-gradient(135deg, rgba(59, 92, 122, 0.3), rgba(40, 65, 90, 0.4)); 
      color: #9bb7d4; 
      box-shadow: 0 8px 20px rgba(59, 92, 122, 0.2);
      border: 1px solid rgba(59, 92, 122, 0.3);
    }

    .stat-info h4 {
      font-size: 13px;
      font-weight: 600;
      color: #8fa3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-info span {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #f0e6d9 0%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card {
      background: rgba(15, 25, 42, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 38px 42px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(44, 95, 138, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      max-width: 820px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(44, 95, 138, 0.5), rgba(182, 139, 92, 0.5), transparent);
    }

    .card h2 {
      font-size: 26px;
      font-weight: 700;
      color: #f1e9db;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.5px;
    }

    .card p {
      color: #a0b9ce;
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    /* Buttons – powerful gradients */
    .btn-primary {
      background: linear-gradient(135deg, #2c5f8a 0%, #1a4060 100%);
      color: white;
      border: 1px solid rgba(245, 231, 211, 0.2);
      padding: 14px 32px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 12px 28px -8px rgba(44, 95, 138, 0.5), 0 0 20px rgba(44, 95, 138, 0.2);
      letter-spacing: -0.2px;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-primary:hover::after {
      opacity: 1;
    }

    .btn-primary i { font-size: 1rem; }
    .btn-primary:hover {
      background: linear-gradient(135deg, #3670a3 0%, #204d70 100%);
      transform: translateY(-3px);
      box-shadow: 0 18px 35px -10px rgba(44, 95, 138, 0.6), 0 0 30px rgba(44, 95, 138, 0.3);
      border-color: rgba(245, 231, 211, 0.35);
    }

    .btn-soft {
      background: rgba(255, 255, 255, 0.04);
      color: #d4e0f0;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .btn-soft:hover { 
      background: rgba(255, 255, 255, 0.08); 
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
    }

    .btn-accent {
      background: linear-gradient(135deg, #b68b5c 0%, #8b653b 100%);
      color: white;
      box-shadow: 0 12px 28px -8px rgba(182, 139, 92, 0.5), 0 0 20px rgba(182, 139, 92, 0.2);
      border: 1px solid rgba(245, 231, 211, 0.25);
    }
    .btn-accent:hover { 
      background: linear-gradient(135deg, #c89a6a 0%, #9e7548 100%);
      box-shadow: 0 18px 35px -10px rgba(182, 139, 92, 0.6), 0 0 30px rgba(182, 139, 92, 0.3);
      border-color: rgba(245, 231, 211, 0.4);
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 24px 0 28px;
    }

    .plan {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 22px;
      padding: 28px 24px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.3s;
      position: relative;
    }

    .plan:hover {
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .plan h4 { font-size: 18px; font-weight: 700; color: #f1e9db; }
    .plan .price { 
      font-weight: 700; 
      font-size: 30px; 
      background: linear-gradient(135deg, #f5e7d3 0%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 10px 0 18px; 
    }
    .plan .price small { font-size: 16px; color: #7b8ea3; -webkit-text-fill-color: #7b8ea3; }

    .plan-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 12px 26px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      color: #d4e0f0;
      font-size: 14px;
    }
    .plan-btn:hover { 
      background: #2c5f8a; 
      color: white; 
      border-color: #2c5f8a; 
      box-shadow: 0 8px 20px rgba(44, 95, 138, 0.4);
    }

    .dark-plan { 
      background: rgba(44, 95, 138, 0.2); 
      border-color: rgba(44, 95, 138, 0.3); 
      box-shadow: 0 0 30px rgba(44, 95, 138, 0.1);
    }
    .dark-plan h4, .dark-plan .price { color: white; -webkit-text-fill-color: white; }
    .dark-plan .plan-btn { 
      background: #f5e7d3; 
      border-color: #f5e7d3; 
      color: #1e293b; 
      font-weight: 700; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .dark-plan .plan-btn:hover { 
      background: #e8d5bb; 
      box-shadow: 0 12px 25px rgba(0,0,0,0.4);
    }

    .button-group { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }

    .domain-search-row {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
    }
    .domain-input {
      flex: 1;
      padding: 15px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      font-size: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.04);
      color: #e2e8f0;
      transition: all 0.3s;
    }
    .domain-input::placeholder { color: #5a6f85; }
    .domain-input:focus { 
      border-color: #2c5f8a; 
      background: rgba(0,0,0,0.3); 
      box-shadow: 0 0 20px rgba(44, 95, 138, 0.15);
    }

    @media (max-width: 850px) {
      .sidebar { width: 80px; padding: 20px 8px; }
      .brand-text, .search-box, .sidebar-btn span, .logout-btn span {
        display: none;
      }
      .sidebar-btn { justify-content: center; padding: 14px; }
      .main { margin-left: 80px; padding: 24px 20px; }
      .pricing-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Sidebar with ultra premium glass effect -->
  <aside class="sidebar">
    <div class="brand-area">
      <div class="brand-icon"><i class="fas fa-cloud-upload-alt"></i></div>
      <div class="brand-text">
        <h2>AREX HOISTING</h2>
        <span>SELLER PORTAL</span>
      </div>
    </div>

    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Search services..." />
    </div>

    <nav class="nav-menu">
      <button class="sidebar-btn active" onclick="navigateTo('dashboard', this)">
        <i class="fas fa-th-large"></i> <span>Dashboard</span>
      </button>
      <button class="sidebar-btn" onclick="navigateTo('pricing', this)">
