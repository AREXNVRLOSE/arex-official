<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ GOOGLE VERIFY (IMPORTANT - untouched) -->
<meta name="google-site-verification" content="HsYnoFWLu8CwqFze48EK2fjGONopioQx73js35MjOEY" />

<title>AREX HOSTING | Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --bg-dark: #020617;
    --sidebar-bg: rgba(15, 23, 42, 0.8);
    --accent: #06b6d4;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
}

/* Sidebar */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    height: 100vh;
    width: 260px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(15px);
    padding: 30px 20px;
}

.logo-area {
    text-align: center;
    margin-bottom: 40px;
}

.logo-area img {
    width: 110px;
    border-radius: 50%;
    border: 2px solid var(--accent);
}

.brand-name {
    font-size: 20px;
    color: var(--accent);
    margin-top: 10px;
}

/* Nav */
.nav-menu a {
    display: flex;
    gap: 12px;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    color: var(--text-dim);
    text-decoration: none;
    cursor: pointer;
}

.nav-menu a:hover,
.nav-menu a.active {
    background: rgba(6,182,212,0.1);
    color: var(--accent);
}

/* Main */
.main-content {
    margin-left: 260px;
    padding: 30px;
}

.card {
    background: rgba(30, 41, 59, 0.5);
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

button {
    background: var(--accent);
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    color: black;
    cursor: pointer;
    margin-top: 10px;
}

/* Mobile */
@media(max-width:768px){
    .sidebar { width: 80px; }
    .main-content { margin-left: 80px; }
    .nav-menu span { display:none; }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo-area">
        <img src="https://i.ibb.co/Lzt9YV3/IMG-20260502-072355-683.webp">
        <div class="brand-name">AREX PRO</div>
    </div>

    <div class="nav-menu">
        <a class="nav-item active" onclick="showPage('dashboard')"><i class="fa fa-home"></i> <span>Dashboard</span></a>
        <a class="nav-item" onclick="showPage('services')"><i class="fa fa-server"></i> <span>Services</span></a>
        <a class="nav-item" onclick="showPage('billing')"><i class="fa fa-credit-card"></i> <span>Billing</span></a>
        <a class="nav-item" onclick="showPage('support')"><i class="fa fa-headset"></i> <span>Support</span></a>
    </div>
</div>

<!-- MAIN -->
<div class="main-content">

<!-- DASHBOARD -->
<div id="dashboard" class="page">
    <h1>Welcome, Aryan</h1>
    <p style="color:gray;">AREX Control Panel</p>

    <div class="card">
        <h3>Active Services</h3>
        <h2>03</h2>
    </div>

    <div class="card">
        <h3>Server Status</h3>
        <p style="color:lightgreen;">Running on Port 8080</p>
        <button onclick="alert('Server Restarted')">Restart Server</button>
    </div>
</div>

<!-- SERVICES -->
<div id="services" class="page" style="display:none;">
    <h1>My Services</h1>

    <div class="card">
        <h3>Web Hosting</h3>
        <p>Status: Active</p>
        <button onclick="alert('Opening panel...')">Manage</button>
    </div>

    <div class="card">
        <h3>Cloud Tunnel</h3>
        <p>Status: Running</p>
        <button onclick="alert('Tunnel Restarted')">Restart</button>
    </div>
</div>

<!-- BILLING -->
<div id="billing" class="page" style="display:none;">
    <h1>Billing</h1>

    <div class="card">
        <h3>Balance</h3>
        <h2>₹0.00</h2>
        <button onclick="alert('Add Money Coming Soon')">Add Funds</button>
    </div>
</div>

<!-- SUPPORT -->
<div id="support" class="page" style="display:none;">
    <h1>Support</h1>

    <div class="card">
        <h3>Contact Support</h3>
        <button onclick="alert('Support Ticket Created')">Create Ticket</button>
    </div>
</div>

</div>

<!-- JS -->
<script>
function showPage(pageId){
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(pageId).style.display = 'block';

    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    event.currentTarget.classList.add('active');
}
</script>

</body>
    </html>
